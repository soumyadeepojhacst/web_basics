<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #0f172a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    form {
        background: #1e293b;
        padding: 40px;
        width: 380px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        color: white;
    }

    label {
        font-size: 14px;
        font-weight: 500;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 5px;
        border: none;
        margin-bottom: 15px;
    }

    input[type="radio"],
    input[type="checkbox"] {
        margin-right: 5px;
        margin-top: 10px;
    }

    select {
        background: white;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #38bdf8;
        border: none;
        border-radius: 5px;
        color: black;
        font-weight: bold;
        cursor: pointer;
        margin-top: 15px;
    }

    button:hover {
        background: #0ea5e9;
    }
</style>

</head>
<body>
    <form method="get">
        <label for="name">Name : </label>
        <input type="text" id="name" placeholder="Enter your name">

        <br><br>

        <label for="email">Email Address : </label>
        <input type="email" id="email" placeholder="Enter your email address" required>

        <br><br>

        <label for="ph">Phone Number : </label>
        <input type="tel" id="ph" placeholder="Enter your phone number" required>

        <br><br>

        <label>Gender : </label>
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
        
        <br><br><br>

        <label>Select Your Interset : </label><br>
        <input type="checkbox" name="interest" value="AI"> Artificial Intelligence<br>
        <input type="checkbox" name="interest" value="Cloud"> Cloud Computing<br>
        <input type="checkbox" name="interest" value="Cybersecurity"> Cybersecurity

        <br><br>

        <label>Year of Study year :</label><br>
        <select name="year">
            <option hidden selected disabled>select your study year</option>
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
            <option>4th Year</option>
            <option>Professional</option>
        </select>

        <br><br>

        <button>Register</button>

    </form>
</body>
</html>
